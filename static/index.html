<!DOCTYPE html>
<!-- =============================================================================
     File: static/index.html
     Project: snap-coin-msg
     Description: Multi-wallet panel layout - left/right columns + chain events
     Version: 0.13.0
============================================================================= -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAP Coin MSG</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="app">

        <!-- HEADER -->
        <header id="header">
            <div id="header-left">
                <span class="logo">SNAP</span>
                <span class="logo-sub">MSG</span>
            </div>
            <div id="header-center">
                <div id="status-app">
                    <span id="app-status-dot" class="status-dot disconnected"></span>
                    <span id="app-status-label">app: disconnected</span>
                </div>
                <div class="status-divider">|</div>
                <div id="status-node">
                    <span id="node-status-dot" class="status-dot no-node"></span>
                    <span id="node-status-label">node: unknown</span>
                </div>
            </div>
            <div id="header-right">
                <button id="btn-decode-toggle" class="btn-toggle active">DECODE</button>
            </div>
        </header>

        <!-- THREE COLUMN LAYOUT -->
        <div id="main">

            <!-- LEFT COLUMN -->
            <div class="wallet-column" id="col-left">
                <div class="col-wallets" id="wallets-left"></div>
            </div>

            <!-- CENTER COLUMN -->
            <div id="col-center">

                <!-- fixed top header - height only -->
                <div id="center-top-header">
                    <span id="chain-height-label">HEIGHT</span>
                    <span id="chain-height">-</span>
                </div>

                <!-- WORKSPACE section -->
                <div class="center-section" id="section-workspace">
                    <div class="center-section-header">
                        <span class="center-section-title">WORKSPACE</span>
                        <button class="btn-section-toggle" id="btn-toggle-workspace">EXPAND</button>
                    </div>
                    <div class="center-section-body hidden" id="body-workspace">
                        <div id="workspace-tabs">
                            <button class="workspace-tab active" data-tab="contacts">CONTACTS</button>
                            <button class="workspace-tab" data-tab="import-wallet">IMPORT WALLET</button>
                            <button class="workspace-tab" data-tab="create-wallet">CREATE WALLET</button>
                        </div>
                        <div id="workspace-body"></div>
                    </div>
                </div>

                <!-- EVENTS section -->
                <div class="center-section" id="section-events">
                    <div class="center-section-header">
                        <span class="center-section-title">EVENTS</span>
                        <button class="btn-section-toggle" id="btn-toggle-events">EXPAND</button>
                    </div>
                    <div class="center-section-body hidden" id="body-events">
                        <div id="col-entries-chain"></div>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="wallet-column" id="col-right">
                <div class="col-wallets" id="wallets-right"></div>
            </div>

        </div>
    </div>

    <!-- PIN OVERLAY -->
    <div id="pin-overlay" class="hidden">
        <div id="pin-box">
            <div id="pin-title">ENTER WALLET PIN</div>
            <input class="modal-input" id="pin-input" type="password" placeholder="PIN">
            <div id="pin-controls">
                <button id="pin-cancel" class="btn-compose">CANCEL</button>
                <button id="pin-confirm" class="btn-compose btn-send">UNLOCK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
