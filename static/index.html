<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAP Coin MSG</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div id="app">

        <!-- HEADER -->
        <header id="header">
            <div id="header-left">
                <span class="logo">SNAP</span>
                <span class="logo-sub">MSG</span>
            </div>
            <div id="header-center">
                <div id="status-app">
                    <span id="app-status-dot" class="status-dot disconnected"></span>
                    <span id="app-status-label">app: disconnected</span>
                </div>
                <div class="status-divider">|</div>
                <div id="status-node">
                    <span id="node-status-dot" class="status-dot no-node"></span>
                    <span id="node-status-label">node: unknown</span>
                </div>
            </div>
            <div id="header-right">
                <select id="active-wallet-select">
                    <option value="">select wallet</option>
                </select>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div id="main">

            <!-- LEFT PANEL -->
            <div id="panel-left">
                <div class="panel-section">
                    <div class="panel-title">WALLETS</div>
                    <div id="wallet-list"></div>
                    <button class="btn-add" id="btn-add-wallet">+ add wallet</button>
                </div>
                <div class="panel-section">
                    <div class="panel-title">CONTACTS</div>
                    <div id="contact-list"></div>
                    <button class="btn-add" id="btn-add-contact">+ add contact</button>
                </div>
                <div class="panel-section">
                    <div class="panel-title">WATCHING</div>
                    <div id="watch-list"></div>
                    <button class="btn-add" id="btn-add-watch">+ add pair</button>
                </div>
            </div>

            <!-- CENTER PANEL -->
            <div id="panel-center">

                <!-- three columns -->
                <div id="convo-columns">

                    <!-- wallet a -->
                    <div class="convo-col" id="col-a">
                        <div class="col-header" id="col-header-a">
                            <div class="col-name" id="col-name-a">WALLET A</div>
                            <div class="col-balance" id="col-balance-a"></div>
                        </div>
                        <div class="col-entries" id="col-entries-a"></div>
                    </div>

                    <!-- chain events -->
                    <div class="convo-col" id="col-chain">
                        <div class="col-header" id="col-header-chain">
                            <div class="col-name">CHAIN EVENTS</div>
                            <div id="chain-height-display">
                                <div id="chain-height-label">CURRENT HEIGHT</div>
                                <div id="chain-height">-</div>
                            </div>
                        </div>
                        <div class="col-entries" id="col-entries-chain"></div>
                    </div>

                    <!-- wallet b -->
                    <div class="convo-col" id="col-b">
                        <div class="col-header" id="col-header-b">
                            <div class="col-name" id="col-name-b">WALLET B</div>
                            <div class="col-balance" id="col-balance-b"></div>
                        </div>
                        <div class="col-entries" id="col-entries-b"></div>
                    </div>

                </div>

                <!-- keyboard -->
                <div id="keyboard-area">
                    <div id="keyboard-tabs"></div>
                    <div id="keyboard-keys"></div>
                </div>

                <!-- compose -->
                <div id="compose-area">
                    <div id="compose-tokens"></div>
                    <div id="compose-controls">
                        <button id="btn-clear" class="btn-compose">CLEAR</button>
                        <button id="btn-send" class="btn-compose btn-send">SEND</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modal-overlay" class="hidden">
        <div id="modal-box">
            <div id="modal-title"></div>
            <div id="modal-body"></div>
            <div id="modal-controls">
                <button id="modal-cancel" class="btn-compose">CANCEL</button>
                <button id="modal-confirm" class="btn-compose btn-send">CONFIRM</button>
            </div>
        </div>
    </div>

    <!-- PIN -->
    <div id="pin-overlay" class="hidden">
        <div id="pin-box">
            <div id="pin-title">ENTER WALLET PIN</div>
            <input class="modal-input" id="pin-input" type="password" placeholder="PIN">
            <div id="pin-controls">
                <button id="pin-cancel" class="btn-compose">CANCEL</button>
                <button id="pin-confirm" class="btn-compose btn-send">UNLOCK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
