<!DOCTYPE html>
<!-- =============================================================================
     File: static/index.html
     Tree: snap-coin-deals/static/index.html
     Description: SNAP Deals — mobile-first maritime dark theme
                  No hidden classes on screens — JS controls display via style.display
                  Three views: member, business, admin
     Version: 0.2.0
============================================================================= -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAP Deals</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <!-- =====================================================================
         LOGIN SCREEN — visible on load (CSS default for #screen-login is flex)
         JS hides this after successful auth
    ====================================================================== -->
    <div id="screen-login" class="screen">
        <div id="login-wrap">
            <div id="login-logo">
                <span class="logo-snap">SNAP</span>
                <span class="logo-deals">Deals</span>
            </div>
            <div id="login-tagline">Local savings. On the chain.</div>
            <div id="login-form">
                <input
                    id="login-token-input"
                    type="password"
                    placeholder="Enter your access token"
                    autocomplete="off"
                >
                <button id="btn-login">SIGN IN</button>
                <div id="login-error">Invalid token — please try again</div>
            </div>
            <div id="login-footer">Halifax · Dartmouth · Nova Scotia</div>
        </div>
    </div>

    <!-- =====================================================================
         MAIN APP — hidden on load (JS sets display:flex after auth)
    ====================================================================== -->
    <div id="screen-app" class="screen" style="display:none">

        <!-- HEADER -->
        <header id="header">
            <div id="header-left">
                <span class="logo-snap">SNAP</span>
                <span class="logo-deals">Deals</span>
            </div>
            <div id="header-center">
                <span id="header-location">Halifax · NS</span>
            </div>
            <div id="header-right">
                <span id="header-role-badge"></span>
                <button id="btn-logout" title="Sign out">⏻</button>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="main-content">

            <!-- MEMBER VIEWS -->
            <div id="view-deals" class="view">
                <div class="view-header">
                    <span class="view-title">Local Deals</span>
                    <span id="deals-savings-total" class="savings-badge"></span>
                </div>
                <div id="deals-feed"></div>
            </div>

            <div id="view-my-claims" class="view">
                <div class="view-header">
                    <span class="view-title">My Claims</span>
                    <span id="claims-total-saved" class="savings-badge"></span>
                </div>
                <div id="my-claims-list"></div>
            </div>

            <div id="view-profile" class="view">
                <div class="view-header">
                    <span class="view-title">My Profile</span>
                </div>
                <div id="profile-content"></div>
            </div>

            <!-- BUSINESS VIEWS -->
            <div id="view-biz-deals" class="view">
                <div class="view-header">
                    <span class="view-title">My Deals</span>
                    <button id="btn-post-deal" class="btn-action-sm">+ POST DEAL</button>
                </div>
                <div id="biz-deals-list"></div>
            </div>

            <div id="view-biz-claims" class="view">
                <div class="view-header">
                    <span class="view-title">Claims</span>
                </div>
                <div id="biz-claims-list"></div>
            </div>

            <div id="view-biz-scanner" class="view">
                <div class="view-header">
                    <span class="view-title">Verify Member</span>
                </div>
                <div id="scanner-content">
                    <div id="scanner-input-wrap">
                        <input
                            id="scanner-wallet-input"
                            type="text"
                            placeholder="Paste member wallet address"
                            autocomplete="off"
                        >
                        <button id="btn-verify-member">VERIFY</button>
                    </div>
                    <div id="scanner-result"></div>
                </div>
            </div>

            <!-- ADMIN VIEWS -->
            <div id="view-admin-members" class="view">
                <div class="view-header">
                    <span class="view-title">Members</span>
                    <span id="admin-members-count" class="count-badge"></span>
                </div>
                <div id="admin-members-list"></div>
            </div>

            <div id="view-admin-businesses" class="view">
                <div class="view-header">
                    <span class="view-title">Businesses</span>
                    <span id="admin-biz-count" class="count-badge"></span>
                </div>
                <div id="admin-biz-list"></div>
            </div>

            <div id="view-admin-deals" class="view">
                <div class="view-header">
                    <span class="view-title">All Deals</span>
                    <span id="admin-deals-count" class="count-badge"></span>
                </div>
                <div id="admin-deals-list"></div>
            </div>

        </main>

        <!-- BOTTOM NAV -->
        <nav id="bottom-nav"></nav>

    </div>

    <!-- =====================================================================
         MODALS — display:none in CSS, JS sets display:flex to open
    ====================================================================== -->

    <div id="modal-claim" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">Claim This Deal?</div>
            <div id="modal-claim-body"></div>
            <div class="modal-controls">
                <button class="btn-modal-cancel" id="btn-claim-cancel">CANCEL</button>
                <button class="btn-modal-confirm" id="btn-claim-confirm">CLAIM</button>
            </div>
        </div>
    </div>

    <div id="modal-post-deal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">Post a Deal</div>
            <input class="modal-input" id="post-deal-title" type="text" placeholder="Deal headline">
            <textarea class="modal-input" id="post-deal-description" placeholder="Deal description" rows="3"></textarea>
            <input class="modal-input" id="post-deal-value" type="number" placeholder="CAD value (e.g. 10)">
            <input class="modal-input" id="post-deal-claims-max" type="number" placeholder="Max claims (0 = unlimited)">
            <div class="modal-controls">
                <button class="btn-modal-cancel" id="btn-post-deal-cancel">CANCEL</button>
                <button class="btn-modal-confirm" id="btn-post-deal-confirm">POST</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
